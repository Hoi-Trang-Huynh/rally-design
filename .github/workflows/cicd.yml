name: CI Rally Design

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: rally-design
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: rally-design
  SA_EMAIL: github-actions@rally-go-6.iam.gserviceaccount.com
  WIF_PROVIDER: projects/371906055890/locations/global/workloadIdentityPools/github/providers/github

jobs:
  # 1️⃣ BUILD
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # 2️⃣ PUSH IMAGE
  push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}"
          COMMIT_TAG="${GITHUB_SHA::7}"

          # Use a simpler Dockerfile that just copies pre-built dist into nginx
          cat > Dockerfile.deploy <<'DOCKERFILE'
          FROM nginx:alpine
          COPY dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 8080
          CMD ["nginx", "-g", "daemon off;"]
          DOCKERFILE

          docker build -f Dockerfile.deploy -t "$IMAGE:latest" -t "$IMAGE:$COMMIT_TAG" .

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            docker tag "$IMAGE:latest" "$IMAGE:$VERSION_TAG"
            echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          fi

          echo "IMAGE_FULL=$IMAGE:$COMMIT_TAG" >> $GITHUB_ENV

      - name: Ensure GAR repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.IMAGE_NAME }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            || gcloud artifacts repositories create ${{ env.IMAGE_NAME }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="Docker repository for ${{ env.IMAGE_NAME }} images"

      - name: Push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"

          if [[ -n "$VERSION_TAG" ]]; then
            docker push "$IMAGE:$VERSION_TAG"
          fi

      - name: Upload image info
        run: echo "$IMAGE_FULL" > image.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image.txt

  # 3️⃣ DEPLOY
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download image info
        uses: actions/download-artifact@v4
        with:
          name: image-info

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE_FULL=$(cat image.txt)
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --service-account=${{ env.SA_EMAIL }} \
            --image="$IMAGE_FULL" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --max-instances=5 \
            --quiet
